<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SSGPT6 · Admin Analytics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .chart-box {
      height: 180px;
      background: #050814;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <h1>Analytics Dashboard</h1>
      <div class="tagline">Visual overview of platform activity (UI only).</div>
    </header>

    <div class="section">
      <h2>Engagement Metrics</h2>
      <div class="panel">
        <div class="chart-box">Free Play Sessions (Placeholder Chart)</div>
        <div class="chart-box">Membership Conversions (Placeholder Chart)</div>
        <div class="chart-box">Daily Active Users (Placeholder Chart)</div>
      </div>
    </div>

    <div class="section">
      <h2>System Health</h2>
      <div class="panel">
        <div class="chart-box">Server Load (Placeholder)</div>
        <div class="chart-box">API Response Time (Placeholder)</div>
      </div>
    </div>

  </div>
</body>
</html>
