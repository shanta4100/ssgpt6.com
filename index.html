<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citadel Gate</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0f14;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    .hidden {
        display: none;
    }

    #admin-gate {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.9);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
    }

    #admin-gate > div {
        background: #111;
        padding: 25px;
        border-radius: 10px;
        text-align: center;
        transition: transform 0.1s;
    }

    input {
        padding: 10px;
        font-size: 16px; /* prevents iOS zoom */
        width: 200px;
        margin-top: 10px;
    }

    button {
        margin-top: 10px;
        padding: 10px 20px;
        cursor: pointer;
    }

    #error-msg {
        color: red;
        margin-top: 10px;
    }
</style>
</head>

<body>

<h1>Main Site Content</h1>

<div id="admin-gate" class="hidden">
    <div>
        <h2>ENTER MASTER KEY</h2>
        <input id="master-key" type="password" placeholder="Enter key">
        <br>
        <button onclick="verifyRoot()">Unlock</button>
        <div id="error-msg" class="hidden">Invalid Key</div>
    </div>
</div>

<script>
(function () {

    function bootCitadel() {
        const params = new URLSearchParams(window.location.search);

        const hasRoot =
            params.get('access') === 'root' ||
            window.location.search.includes('root');

        if (!hasRoot) return;

        const gate = document.getElementById('admin-gate');
        const input = document.getElementById('master-key');

        if (gate) gate.classList.remove('hidden');

        // iOS FIX: must come from user interaction
        function enableFocus() {
            if (input) input.focus();
        }

        document.addEventListener('touchstart', enableFocus, { once: true });
        document.addEventListener('click', enableFocus, { once: true });

        // Clean URL
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', bootCitadel);
    } else {
        bootCitadel();
    }

    window.verifyRoot = function () {
        const input = document.getElementById('master-key');
        const errorMsg = document.getElementById('error-msg');

        if (!input) return;

        const key = input.value;

        if (key === 'SHANTA-2026') {
            localStorage.setItem('ssgpt6_root', 'true');

            alert('CITADEL UNLOCKED');

            window.location.replace(
                window.location.pathname + '?auth=success'
            );
        } else {
            if (errorMsg) errorMsg.classList.remove('hidden');

            const box = document.querySelector('#admin-gate > div');
            if (box) {
                box.style.transform = 'translateX(10px)';
                setTimeout(() => box.style.transform = 'translateX(-10px)', 50);
                setTimeout(() => box.style.transform = 'translateX(0)', 100);
            }
        }
    };

})();
</script>

</body>
</html>
