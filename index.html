<script>
    // MOBILE-OPTIMIZED GHOST TRIGGER
    function initializeCitadel() {
        const urlParams = new URLSearchParams(window.location.search);
        
        // Use 'access' or 'root' as the trigger for iOS reliability
        if (urlParams.get('access') === 'root' || window.location.search.includes('root')) {
            const gate = document.getElementById('admin-gate');
            const input = document.getElementById('master-key');
            
            if (gate) {
                gate.classList.remove('hidden');
                // Automatically focus the keyboard for iPhone/iPad users
                setTimeout(() => input.focus(), 300);
            }
            
            // Instantly clean the URL bar for security
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }

    // iOS/Safari compatibility: Trigger as soon as the DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeCitadel);
    } else {
        initializeCitadel();
    }

    function verifyRoot() {
        const key = document.getElementById('master-key').value;
        const msg = document.getElementById('error-msg');
        
        if (key === 'SHANTA-2026') { 
            localStorage.setItem('root_access', 'true');
            alert('CITADEL UNLOCKED');
            // Force a clean reload to bypass Safari's cache
            window.location.href = window.location.origin + window.location.pathname;
        } else {
            msg.classList.remove('hidden');
            // Shake effect for mobile feedback
            const gateBox = document.querySelector('#admin-gate div');
            gateBox.style.transform = 'translateX(10px)';
            setTimeout(() => gateBox.style.transform = 'translateX(0)', 100);
        }
    }
</script>
