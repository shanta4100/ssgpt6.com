<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SSGPT6 · Content Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .content-item {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 12px;
      background: #050814;
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <h1>Content Manager</h1>
      <div class="tagline">Manage PLAY modules, events, and pages (UI only).</div>
    </header>

    <div class="section">
      <h2>PLAY Modules</h2>
      <div class="panel">
        <div class="content-item">Puzzle Game — Active</div>
        <div class="content-item">Word Builder — Active</div>
        <div class="content-item">Story Tiles — Active</div>
      </div>
    </div>

    <div class="section">
      <h2>Events</h2>
      <div class="panel">
        <div class="content-item">Spring Story Festival — Scheduled</div>
        <div class="content-item">Global Learning Jam — Active</div>
      </div>
    </div>

  </div>
</body>
</html>
