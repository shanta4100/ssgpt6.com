<!DOCTYPE html>
<html>
<body style="background:#07111f;color:white;text-align:center;font-family:Arial;padding:40px;">

<h1 style="color:gold;">GN-AI Financial Intelligence</h1>
<p>Educational • Protected • No Trading</p>

<h2>Apple (AAPL)</h2>
<p id="price">Loading...</p>

<div id="status" style="margin-top:10px;color:#ccc;"></div>

<div id="news" style="margin-top:20px;"></div>

<script>
const API_KEY = "ZD88CFMC438XC7Q8";

// SAFE PRICE LOADER
async function loadPrice() {
  try {
    const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=AAPL&apikey=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();

    if (data["Global Quote"] && data["Global Quote"]["05. price"]) {
      document.getElementById("price").innerText =
        "Price: $" + data["Global Quote"]["05. price"];
      document.getElementById("status").innerText = "Live data connected";
    } else {
      throw new Error("No data");
    }

  } catch (error) {
    document.getElementById("price").innerText =
      "Price: $Demo (Safe Mode)";
    document.getElementById("status").innerText =
      "Live API unavailable — safe mode active";
  }
}

// SIMPLE NEWS (STATIC SAFE MODE)
function loadNews() {
  document.getElementById("news").innerHTML = `
    <div style="background:#132b4a;padding:10px;margin:10px;">
      • Market intelligence module active (safe mode)
    </div>
  `;
}

// RUN
loadPrice();
loadNews();
</script>

</body>
</html>
