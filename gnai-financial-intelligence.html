<script>
const API_KEY = "ZD88CFMC438XC7Q8";
const NEWS_API = "96bc9d3cc53f49abb2d8ebfd87b886e1";

// LOAD STOCK + AI LOGIC
async function load(symbol, priceId, signalId) {
  try {
    const res = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${API_KEY}`);
    const data = await res.json();

    let price = 0;

    if (data["Global Quote"] && data["Global Quote"]["05. price"]) {
      price = parseFloat(data["Global Quote"]["05. price"]);
      document.getElementById(priceId).innerText = "$" + price;
    } else {
      throw new Error();
    }

    const sentiment = await getSentiment(symbol);
    generateAI(signalId, price, sentiment, symbol);

  } catch {
    document.getElementById(priceId).innerText = "$Demo";
    document.getElementById(signalId).innerText = "🟡 Safe Mode";
  }
}

// SENTIMENT ENGINE
async function getSentiment(symbol) {
  try {
    const res = await fetch(`https://newsapi.org/v2/everything?q=${symbol}&apiKey=${NEWS_API}`);
    const data = await res.json();

    let positive = 0;
    let negative = 0;

    data.articles.slice(0,5).forEach(article => {
      const text = article.title.toLowerCase();

      if (text.includes("growth") || text.includes("profit")) positive++;
      if (text.includes("loss") || text.includes("drop")) negative++;
    });

    if (positive > negative) return "Positive";
    if (negative > positive) return "Negative";
    return "Neutral";

  } catch {
    return "Neutral";
  }
}

// AI SIGNAL + EXPLANATION
function generateAI(id, price, sentiment, symbol) {
  let signal = "🟡 Watch";
  let reason = "";

  if (price > 200 && sentiment === "Positive") {
    signal = "🟢 Stable";
    reason = "Strong price + positive sentiment";
  }
  else if (sentiment === "Negative") {
    signal = "🔴 Risk";
    reason = "Negative news pressure";
  }
  else {
    signal = "🟡 Watch";
    reason = "Mixed signals";
  }

  document.getElementById(id).innerHTML =
    signal + "<br><small>" + reason + "</small>";
}

// LOAD
load("AAPL", "aapl-price", "aapl-signal");
load("TSLA", "tsla-price", "tsla-signal");

// BTC stays demo
</script>
